  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #003087;
      --red: #CC0000;
      --gold: #FFD700;
      --white: #FFFFFF;
      --light: #F4F7FC;
      --grey: #6B7A8D;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Open Sans', sans-serif; color: #1a1a2e; background: var(--white); }

    nav {
      background: var(--navy);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; height: 70px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .nav-logo img { height: 48px; }
    .nav-title { color: var(--white); font-family: 'Playfair Display', serif; font-size: 14px; line-height: 1.3; }
    .nav-title span { display: block; font-size: 10px; color: var(--gold); letter-spacing: 2px; font-family: 'Open Sans', sans-serif; font-weight: 600; }
    .nav-links { display: flex; gap: 24px; list-style: none; }
    .nav-links a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 13px; font-weight: 600; transition: color 0.2s; }
    .nav-links a:hover { color: var(--gold); }
    .nav-fb { background: #1877F2; color: var(--white) !important; padding: 8px 16px; border-radius: 6px; font-weight: 700 !important; }

    .hero {
      background: linear-gradient(160deg, var(--navy) 0%, #001a5e 60%, #000d3a 100%);
      min-height: 90vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 60px 5%; position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(204,0,0,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero-inner { position: relative; z-index: 2; max-width: 750px; }
    .hero-logo { width: 160px; margin: 0 auto 28px; }
    .hero-logo img { width: 100%; }
    .hero-eyebrow {
      display: inline-block;
      background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.4);
      color: var(--gold); font-size: 11px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; padding: 6px 16px; border-radius: 20px; margin-bottom: 20px;
    }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(30px,5vw,52px); color: var(--white); line-height: 1.2; margin-bottom: 16px; }
    .hero h1 span { color: var(--gold); }
    .hero p { font-size: 16px; color: rgba(255,255,255,0.72); line-height: 1.7; margin-bottom: 36px; max-width: 540px; margin-left: auto; margin-right: auto; }
    .hero-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--red); color: var(--white); padding: 14px 28px;
      border-radius: 8px; font-weight: 700; font-size: 15px; text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(204,0,0,0.4);
    }
    .btn-primary:hover { transform: translateY(-2px); }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; color: var(--white); padding: 14px 28px;
      border-radius: 8px; font-weight: 600; font-size: 15px; text-decoration: none;
      border: 1.5px solid rgba(255,255,255,0.35); transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--gold); }

    .section-label { text-align: center; font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--red); margin-bottom: 10px; }
    .section-title { text-align: center; font-family: 'Playfair Display', serif; font-size: clamp(26px,4vw,38px); font-weight: 900; color: var(--navy); margin-bottom: 12px; }
    .section-sub { text-align: center; color: var(--grey); font-size: 15px; max-width: 500px; margin: 0 auto 52px; line-height: 1.7; }

    .services { background: var(--light); padding: 90px 5%; }
    .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; max-width: 1000px; margin: 0 auto; }
    .service-card {
      background: var(--white); border-radius: 14px; padding: 32px 24px;
      border: 1.5px solid #e0e8f5; border-top: 4px solid var(--navy);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .service-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,48,135,0.12); }
    .service-icon { font-size: 32px; margin-bottom: 16px; display:flex; align-items:center; justify-content:center; width:56px; height:56px; background: rgba(0,48,135,0.06); border-radius:12px; }
    .service-card h3 { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
    .service-time { font-size: 13px; font-weight: 700; color: var(--red); margin-bottom: 6px; }
    .service-card p { font-size: 13px; color: var(--grey); line-height: 1.6; }

    .pastor { background: var(--navy); padding: 90px 5%; }
    .pastor-inner { max-width: 800px; margin: 0 auto; text-align: center; }
    .pastor .section-label { color: var(--gold); }
    .pastor .section-title { color: var(--white); }
    .pastor-quote {
      font-size: 18px; font-style: italic; color: rgba(255,255,255,0.8);
      line-height: 1.8; max-width: 580px; margin: 20px auto 0;
      border-left: 4px solid var(--gold); padding-left: 20px; text-align: left;
    }
    .pastor-name { color: var(--gold); font-weight: 700; font-size: 16px; margin-top: 20px; }

    .about { background: var(--white); padding: 90px 5%; }
    .about-inner { max-width: 800px; margin: 0 auto; }
    .about-inner .section-label, .about-inner .section-title { text-align: left; }
    .about-inner p { font-size: 15px; color: var(--grey); line-height: 1.75; margin-top: 16px; }

    .contact { background: var(--light); padding: 90px 5%; }
    .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 900px; margin: 0 auto; }
    .contact-card { background: var(--white); border-radius: 14px; padding: 28px 22px; border: 1.5px solid #e0e8f5; display: flex; align-items: flex-start; gap: 14px; }
    .contact-icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
    .contact-card h4 { font-size: 11px; font-weight: 800; color: var(--grey); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
    .contact-card p, .contact-card a { font-size: 14px; font-weight: 600; color: var(--navy); text-decoration: none; line-height: 1.5; }
    .contact-card a:hover { color: var(--red); }
    .fb-banner {
      margin-top: 36px; background: linear-gradient(135deg, var(--navy), #001a5e);
      border-radius: 16px; padding: 40px; text-align: center;
      border: 1px solid rgba(255,215,0,0.2); max-width: 900px; margin-left: auto; margin-right: auto;
    }
    .fb-banner h3 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--white); margin-bottom: 10px; }
    .fb-banner p { color: rgba(255,255,255,0.65); font-size: 14px; margin-bottom: 24px; }
    .btn-fb { display: inline-flex; align-items: center; gap: 8px; background: #1877F2; color: var(--white); padding: 14px 28px; border-radius: 8px; font-weight: 700; font-size: 15px; text-decoration: none; transition: all 0.2s; }
    .btn-fb:hover { background: #1558b0; }

    footer { background: #000d3a; padding: 32px 5%; text-align: center; }
    footer p { color: rgba(255,255,255,0.35); font-size: 13px; }
    footer span { color: var(--gold); }

    @media(max-width: 768px) { .nav-links { display: none; } }

    /* LIVESTREAM */
    .livestream { background: var(--white); padding: 90px 5%; }
    .stream-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 36px; max-width: 1100px; margin: 0 auto 40px; align-items: start; }
    .stream-player { width: 100%; aspect-ratio: 16/9; border-radius: 14px; overflow: hidden; background: #000; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .stream-player iframe { width: 100%; height: 100%; }
    .stream-info { padding: 10px 0; }
    .live-badge {
      display: inline-block; background: var(--red); color: var(--white);
      font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 20px;
      letter-spacing: 1px; margin-bottom: 16px; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .stream-info h3 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--navy); margin-bottom: 12px; }
    .stream-info p { font-size: 14px; color: var(--grey); line-height: 1.7; margin-bottom: 20px; }
    .stream-times { background: var(--light); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .stream-times h4 { font-size: 13px; font-weight: 800; color: var(--navy); margin-bottom: 12px; }
    .stream-times ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .stream-times li { font-size: 13px; color: var(--grey); }
    .stream-btns { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-youtube { display: inline-flex; align-items: center; gap: 8px; background: #FF0000; color: var(--white); padding: 12px 22px; border-radius: 8px; font-weight: 700; font-size: 14px; text-decoration: none; transition: all 0.2s; }
    .btn-youtube:hover { background: #cc0000; transform: translateY(-2px); }
    .btn-watch { display: inline-flex; align-items: center; gap: 8px; background: var(--navy); color: var(--white); padding: 12px 22px; border-radius: 8px; font-weight: 700; font-size: 14px; text-decoration: none; transition: all 0.2s; }
    .btn-watch:hover { background: #002070; transform: translateY(-2px); }
    .sermons-note { max-width: 1100px; margin: 0 auto; background: linear-gradient(135deg, var(--navy), #001a5e); border-radius: 14px; padding: 32px; text-align: center; border: 1px solid rgba(255,215,0,0.2); }
    .sermons-note p { color: rgba(255,255,255,0.85); font-size: 15px; }
    .sermons-note a { color: var(--gold) !important; border-color: rgba(255,215,0,0.4) !important; }

    @media(max-width: 768px) {
      .stream-wrapper { grid-template-columns: 1fr; }
    }
  </style>
</head>

<section class="about" id="about">
  <div class="about-inner">
    <div class="section-label">Who We Are</div>
    <h2 class="section-title">About Our Church</h2>
    <p>DLBC Adamasingba Group HQRS is a branch of the Deeper Life Bible Church, located in the Adamasingba area of Ibadan, Oyo State, Nigeria. We are a Spirit-filled community of believers committed to holiness, prayer, and the study of God's Word.</p>
    <p>Our mission is simple: Achieving Heaven's Goal. We believe in reaching souls, building disciples, and preparing God's people for eternity. Every service, every fellowship, and every prayer meeting is a step closer to fulfilling that divine purpose.</p>
    <p>Whether you are new to faith or a seasoned believer, you are welcome here. Come as you are and experience the transforming power of God's love.</p>
  </div>
</section>
